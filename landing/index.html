<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweep — Clean your inbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <span class="nav-wordmark">Sweep</span>
    <img src="logo.png" width="28" height="28" alt="Sweep" class="nav-logo" />
  </nav>

  <!-- HERO -->
  <section class="hero">

    <!-- LEFT: content -->
    <div class="hero-left">
      <span class="label-early-access">Early Access</span>

      <h1 class="headline">Your inbox,<br>finally clean.</h1>

      <p class="subheadline">
        Sweep finds and archives college recruitment spam automatically.
        Archive-only — nothing is ever deleted.
      </p>

      <!-- FORM -->
      <form id="signupForm" novalidate>
        <div class="form-group">
          <input
            type="text"
            id="nameInput"
            name="name"
            placeholder="Your name"
            autocomplete="name"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="email"
            id="emailInput"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
        </div>
        <button type="submit" id="submitBtn">Get early access →</button>
        <p id="errorMsg" class="error-msg" aria-live="polite"></p>
      </form>

      <div id="successMsg" class="success-msg" aria-live="polite">
        You're on the list.
      </div>

      <p class="fine-print">No spam. Unsubscribe anytime.</p>
    </div>

    <!-- RIGHT: canvas -->
    <div class="hero-right" id="canvasWrap">
      <canvas id="sweepCanvas"></canvas>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Sweep &mdash; archive-only, never deletes</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
